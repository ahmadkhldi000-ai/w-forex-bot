# ====================================================================
#  W-FOREX-BOT · Render Blueprint
#  This file tells Render how to deploy your backend + database.
#  Render will auto-detect this when you connect your GitHub repo.
# ====================================================================

databases:
  - name: w-forex-db
    databaseName: wforex
    plan: free
    ipAllowList: []

services:
  - type: web
    name: w-forex-bot-api
    env: node
    plan: free
    region: frankfurt        # eu-central — closest to MT5 bridge later
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: npx prisma migrate deploy && node dist/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: w-forex-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@wforexbot.com
      - key: CORS_ORIGIN
        # Set this to your Vercel URL after the frontend is deployed
        # e.g. https://w-forex-bot.vercel.app
        sync: false
      - key: ENCRYPTION_KEY
        generateValue: true
